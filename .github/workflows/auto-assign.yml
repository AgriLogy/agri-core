name: Auto Assign

# Assigns newly opened issues and PRs to mks-zakaria (the shared
# workflow's default assignee).

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  run:
    uses: AgriLogy/shared-workflows/.github/workflows/auto-assign.yml@v1
