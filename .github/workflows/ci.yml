name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # agri-core depends on the PRIVATE agri-db via a tagged git URL
      # (agri-db @ git+…@<tag>). Configure the read-only PAT as a git
      # credential so `uv sync` can fetch it. AGRI_DB_RO_TOKEN must have
      # Contents: Read on AgriLogy/agri-db.
      - name: Authenticate git for the private agri-db dependency
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.AGRI_DB_RO_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.7"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen || uv sync

      - name: ruff check
        run: uv run ruff check .

      - name: Tests (pytest)
        run: uv run pytest -v
