name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agri-core
    steps:
      - name: Checkout agri-core
        uses: actions/checkout@v4
        with:
          path: agri-core

      # agri-core depends on the sibling agri-db via a [tool.uv.sources]
      # path dep (../agri-db). agri-db is PRIVATE, so the default repo-scoped
      # token can't read it — check it out with a fine-grained read-only PAT
      # stored as the AGRI_DB_RO_TOKEN secret. It lands next to agri-core so
      # `../agri-db` resolves at uv-sync time.
      - name: Checkout agri-db (private path dependency)
        uses: actions/checkout@v4
        with:
          repository: AgriLogy/agri-db
          ref: main
          path: agri-db
          token: ${{ secrets.AGRI_DB_RO_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.7"
          enable-cache: true
          cache-dependency-glob: agri-core/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen || uv sync

      - name: ruff check
        run: uv run ruff check .

      - name: Tests (pytest)
        run: uv run pytest -v
