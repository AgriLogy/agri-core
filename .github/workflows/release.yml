name: release

# Manual trigger or push to main. Thin caller into the org-shared
# python-semantic-release workflow: reads conventional commits since the
# last tag, computes the next version, rewrites src/agri/core/_version.py,
# updates CHANGELOG.md, tags (bare {version}), and creates a GitHub
# Release. The release commit carries "[skip ci]" so it does not
# re-trigger; the guard and concurrency group stay caller-side.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: "stable (main) or rc (feat|fix|perf branch)"
        type: choice
        options: [stable, rc]
        default: stable

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    uses: AgriLogy/shared-workflows/.github/workflows/release.yml@v1
    with:
      prerelease: ${{ inputs.release_type == 'rc' }}
